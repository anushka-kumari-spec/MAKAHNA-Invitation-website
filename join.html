<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Makhana Network | Udyamkart Invitation</title>
    
    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>

    <div class="page-shell">
      <!-- Premium Spatial Top Bar (Fixed Capsule Style) -->
      <header class="topbar">
        <a href="index.html" class="brand">
          <img class="brand-logo" src="https://udyamkart.com/wp-content/uploads/2024/03/IMG_20240217_184612-removebg.png" alt="Udyamkart logo" />
          <span>
            <strong>Udyamkart</strong>
            <small>Growth Ecosystem</small>
          </span>
        </a>
        
        <!-- FIX: Architectural Capsule Dock Menu (No Notification Vibe) -->
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="join.html" class="active">Join</a>
          <a href="contact.html">Contact</a>
        </nav>
      </header>

      <main class="page-content">
        <!-- Main Page Hero Title Section with Editorial Playfair Typography -->
        <section class="page-hero reveal" style="text-align: center; max-width: 800px; margin: 40px auto 40px;">
          <p class="eyebrow" style="color: var(--accent-blue);">Join the elite team</p>
          <h1 style="font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 4.5vw, 3.8rem); font-weight: 700; line-height: 1.2; margin-bottom: 24px; color: #ffffff;">
            Share your details & kickstart your growth journey
          </h1>
          <p style="color: var(--muted); font-size: 1.1rem; line-height: 1.7;">
            We are looking for thoughtful, driven individuals who want to scale premium business networks with us.
          </p>
        </section>

        <!-- Glassmorphic Premium Form Card Adjusted to Corporate Cosmos Blue Layout -->
        <section class="reveal" style="max-width: 700px; margin: 0 auto 80px;">
          <div class="hero-card registration-box" style="max-width: 100%; padding: 44px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); backdrop-filter: blur(40px); border-radius: 32px; box-shadow: var(--shadow);">
            
            <form id="joinForm" class="hero-form" action="sendmail.php" method="POST">
              <input type="hidden" name="form_type" value="Join" />
              
              <!-- First Row: Name and Email -->
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 16px;">
                <div class="form-group">
                  <input type="text" id="name" name="name" required placeholder="Full Name" />
                </div>
                <div class="form-group">
                  <input type="email" id="email" name="email" required placeholder="Email Address" />
                </div>
              </div>

              <!-- Second Row: Phone and Dropdown -->
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 16px;">
                <div class="form-group">
                  <input type="tel" id="phone" name="phone" placeholder="Phone Number" />
                </div>
                <div class="form-group">
                  <!-- Custom Styled Select Matching Input Layout Exactly -->
                  <select id="interest" name="interest" style="width: 100%; padding: 18px; border-radius: 14px; border: 1px solid var(--border); background: rgba(0, 0, 0, 0.25); color: var(--text); font-size: 0.95rem; font-family: inherit; transition: all 0.3s ease; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none;">
                    <option value="" disabled selected style="background: var(--bg);">Select Interest Area</option>
                    <option value="Growth" style="background: var(--bg);">Growth Opportunities</option>
                    <option value="Community" style="background: var(--bg);">Community Leadership</option>
                    <option value="Design" style="background: var(--bg);">Creative Collaboration</option>
                  </select>
                </div>
              </div>

              <!-- Message/Textarea field -->
              <div class="form-group" style="margin-bottom: 24px;">
                <textarea id="message" name="message" rows="4" required placeholder="Tell us about yourself (a short note about your goals, experience, or business vision...)" style="width: 100%; padding: 18px; border-radius: 14px; border: 1px solid var(--border); background: rgba(0, 0, 0, 0.25); color: var(--text); font-size: 0.95rem; font-family: inherit; resize: vertical; transition: all 0.3s ease; outline: none;"></textarea>
              </div>

              <!-- Action Button -->
              <button type="submit" class="btn btn-primary form-submit-btn">Submit Application</button>
              
              <p class="form-message" role="status" aria-live="polite" style="text-align: center; margin-top: 12px; font-size: 0.9rem; color: var(--muted);"></p>
            </form>

          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <p>© 2026 Udyamkart. Crafted for thoughtful growth.</p>
      </footer>
    </div>

    <!-- Floating Clean Actions Frame -->
    <div class="floating-actions">
      <a class="fab fab-whatsapp-large" href="https://wa.me/919205520952" target="_blank" rel="noopener noreferrer">💬</a>
      <a class="fab fab-call-large" href="tel:+919205520952">📞</a>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
